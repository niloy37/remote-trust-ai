services:
  graph:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/remote-trust-dev
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - remote_trust_graph:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p remote-trust-dev 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SQLITE_PATH: /app/storage/remote_trust.db
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://graph:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: remote-trust-dev
      INGESTION_ENABLED: "true"
      INGESTION_INTERVAL_SECONDS: "300"
      LAKEHOUSE_PATH: /app/storage/lakehouse
      INGESTION_SOURCE_CONFIG: /app/data/ingestion_sources.json
    ports:
      - "8000:8000"
    volumes:
      - remote_trust_data:/app/storage
    depends_on:
      graph:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_PATH: /api/backend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  remote_trust_data:
  remote_trust_graph:
