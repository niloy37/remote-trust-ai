<svg width="1000" height="620" viewBox="0 0 1000 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RemoteTrust AI analyzer screen</title>
  <desc id="desc">A stylized analyzer screen showing job URL, job description, applicant country, and sample job buttons.</desc>
  <rect width="1000" height="620" rx="26" fill="#08111F"/>
  <rect x="32" y="32" width="936" height="556" rx="22" fill="#0F172A" stroke="#334155"/>
  <text x="66" y="86" fill="#22D3EE" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="2">ANALYZER</text>
  <text x="66" y="128" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Verify a remote job before you apply.</text>
  <text x="68" y="164" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="17">Paste a URL or full description, select applicant country, and run the trust engine.</text>
  <g transform="translate(66 206)">
    <rect width="430" height="326" rx="16" fill="#111827" stroke="#334155"/>
    <text x="24" y="42" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Job URL</text>
    <rect x="24" y="58" width="382" height="46" rx="10" fill="#0B1220" stroke="#475569"/>
    <text x="44" y="87" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">https://jobs.greenhouse.io/company/role</text>
    <text x="24" y="134" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Job description</text>
    <rect x="24" y="150" width="382" height="100" rx="10" fill="#0B1220" stroke="#475569"/>
    <rect x="44" y="172" width="310" height="9" rx="4.5" fill="#334155"/>
    <rect x="44" y="195" width="332" height="9" rx="4.5" fill="#334155"/>
    <rect x="44" y="218" width="248" height="9" rx="4.5" fill="#334155"/>
    <rect x="24" y="270" width="180" height="38" rx="10" fill="#0B1220" stroke="#475569"/>
    <text x="44" y="294" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="13">Applicant: India</text>
    <rect x="218" y="270" width="188" height="38" rx="10" fill="#34D399"/>
    <text x="267" y="294" fill="#052E2B" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Analyze Job</text>
  </g>
  <g transform="translate(542 206)">
    <rect width="392" height="326" rx="16" fill="#111827" stroke="#334155"/>
    <text x="24" y="42" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Live scoring model</text>
    <g transform="translate(24 74)">
      <rect width="344" height="46" rx="12" fill="#0B1220" stroke="#334155"/>
      <circle cx="26" cy="23" r="12" fill="#34D399" fill-opacity="0.2"/>
      <text x="54" y="29" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Rule-based scam detector</text>
      <rect y="62" width="344" height="46" rx="12" fill="#0B1220" stroke="#334155"/>
      <circle cx="26" cy="85" r="12" fill="#22D3EE" fill-opacity="0.2"/>
      <text x="54" y="91" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Company and title extraction</text>
      <rect y="124" width="344" height="46" rx="12" fill="#0B1220" stroke="#334155"/>
      <circle cx="26" cy="147" r="12" fill="#FACC15" fill-opacity="0.2"/>
      <text x="54" y="153" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Remote and global eligibility</text>
      <rect y="186" width="344" height="46" rx="12" fill="#0B1220" stroke="#334155"/>
      <circle cx="26" cy="209" r="12" fill="#A78BFA" fill-opacity="0.2"/>
      <text x="54" y="215" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Graph and web evidence</text>
    </g>
  </g>
