<svg width="1100" height="560" viewBox="0 0 1100 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RemoteTrust AI architecture preview</title>
  <desc id="desc">A system architecture diagram showing frontend, backend, scoring, persistence, graph, and extension layers.</desc>
  <rect width="1100" height="560" rx="28" fill="#08111F"/>
  <rect x="38" y="38" width="1024" height="484" rx="22" fill="#0F172A" stroke="#334155"/>
  <text x="70" y="88" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">RemoteTrust AI architecture</text>
  <text x="70" y="118" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="15">Local-first verification stack for job analysis, persistence, feedback, and relationship evidence.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22D3EE"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="76" y="178" width="188" height="96" rx="16" fill="#111827" stroke="#22D3EE" stroke-opacity="0.55"/>
    <text x="104" y="214" fill="#F8FAFC" font-size="18" font-weight="800">Next.js UI</text>
    <text x="104" y="242" fill="#94A3B8" font-size="13">Analyzer, dashboard,</text>
    <text x="104" y="262" fill="#94A3B8" font-size="13">results and feedback</text>
    <rect x="76" y="336" width="188" height="96" rx="16" fill="#111827" stroke="#34D399" stroke-opacity="0.55"/>
    <text x="104" y="372" fill="#F8FAFC" font-size="18" font-weight="800">Chrome extension</text>
    <text x="104" y="400" fill="#94A3B8" font-size="13">Consent-based active</text>
    <text x="104" y="420" fill="#94A3B8" font-size="13">page extraction</text>
    <rect x="372" y="248" width="190" height="112" rx="16" fill="#111827" stroke="#FACC15" stroke-opacity="0.55"/>
    <text x="408" y="286" fill="#F8FAFC" font-size="18" font-weight="800">FastAPI API</text>
    <text x="408" y="314" fill="#94A3B8" font-size="13">/analyze, /jobs,</text>
    <text x="408" y="334" fill="#94A3B8" font-size="13">/feedback, /health</text>
    <rect x="650" y="154" width="190" height="96" rx="16" fill="#111827" stroke="#A78BFA" stroke-opacity="0.55"/>
    <text x="684" y="190" fill="#F8FAFC" font-size="18" font-weight="800">ML scoring</text>
    <text x="684" y="218" fill="#94A3B8" font-size="13">Extraction, rules,</text>
    <text x="684" y="238" fill="#94A3B8" font-size="13">classification layers</text>
    <rect x="650" y="306" width="190" height="96" rx="16" fill="#111827" stroke="#34D399" stroke-opacity="0.55"/>
    <text x="684" y="342" fill="#F8FAFC" font-size="18" font-weight="800">SQLite</text>
    <text x="684" y="370" fill="#94A3B8" font-size="13">Saved analyses,</text>
    <text x="684" y="390" fill="#94A3B8" font-size="13">feedback, fallback graph</text>
    <rect x="876" y="226" width="150" height="104" rx="16" fill="#111827" stroke="#22D3EE" stroke-opacity="0.55"/>
    <text x="912" y="264" fill="#F8FAFC" font-size="18" font-weight="800">Neo4j</text>
    <text x="912" y="292" fill="#94A3B8" font-size="13">Relationship</text>
    <text x="912" y="312" fill="#94A3B8" font-size="13">evidence graph</text>
  </g>
  <path d="M264 226H364" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M264 384C315 384 318 306 364 306" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M562 284C600 242 608 210 642 204" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M562 322H642" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M840 354C878 354 868 286 868 278" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
